<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Inventario Mocasip</title>
</head>
<body>
    <div class="container">
        <h1>Gestión de Inventario</h1>

        <div class="form-box">
            <h3>Anexar Nuevo Producto</h3>
            <form action="/api/productos" method="POST">
                <input type="text" name="nombre" placeholder="Nombre del producto" required>
                <input type="number" name="stock" placeholder="Cantidad inicial" required>
                <input type="number" step="0.01" name="precio" placeholder="Precio $" required>
                <button type="submit">Agregar al Inventario</button>
            </form>
        </div>

        <hr>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody>
                {% for p in lista %}
                <tr>
                    <td>{{ p.nombre }}</td>
                    <td>{{ p.stock }}</td>
                    <td>${{ p.precio }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
